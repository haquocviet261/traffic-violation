spring:
  datasource:
    url: jdbc:mysql://localhost:3306/traffic_vision_db?useSSL=false&serverTimezone=UTC
    username: root
    password: 123123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 150MB
      max-request-size: 150MB

server:
  port: 8080

logging:
  level:
    com.example.trafficvision: DEBUG
    org.springframework: INFO
    org.hibernate: INFO
